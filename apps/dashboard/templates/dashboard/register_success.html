{% extends "dashboard/base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body p-5">
        <div class="mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="#14b8a6" viewBox="0 0 16 16">
            <path d="M15.854 5.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 0 1 .708-.708L12.5 7.793l2.646-2.647a.5.5 0 0 1 .708 0"/>
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
          </svg>
        </div>
        <h1 class="h4 mb-3">Verifique seu e-mail</h1>
        <p class="text-muted mb-1">
          Enviamos um link de confirmação para
        </p>
        <p class="fw-semibold mb-3">{{ email }}</p>
        <p class="text-muted small mb-4">
          Clique no link recebido para ativar sua conta e começar a usar o Pluma.
          Se não encontrar, verifique sua caixa de spam.
        </p>
        <a href="/login" class="btn btn-outline-primary">Ir para o login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
