name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Django system check
        run: uv run python manage.py check

      - name: Pytest
        run: uv run pytest --cov=apps --cov=config --cov=src/essay_essay --cov-report=term-missing
